name: sync-upstream
on:
  schedule:
    - cron: '0 6 * * *'  # ogni giorno alle 07:00 italiane
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  UPSTREAM_REPO: https://github.com/ahmeabd/italia-corpus.git

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sparse clone upstream (config/collezioni.txt)
        run: |
          git clone --no-checkout --depth 1 --filter=blob:none "$UPSTREAM_REPO" /tmp/upstream
          cd /tmp/upstream
          git sparse-checkout init --cone
          while IFS= read -r col; do
            [ -z "$col" ] && continue
            git sparse-checkout add "$col"
          done < "${{ github.workspace }}/config/collezioni.txt"
          git checkout
      - name: Mirror collezioni nel repo Lab
        run: |
          for dir in /tmp/upstream/*/; do
            name=$(basename "$dir")
            [ "$name" = ".git" ] && continue
            dest="${{ github.workspace }}/$name"
            mkdir -p "$dest"
            rsync -a --delete "$dir" "$dest"
          done
      - name: Commit sync
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "Nessuna modifica — skip commit"
          else
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git commit -m "chore: sync upstream [skip ci]"
            git push
            echo "SYNC_COMMITED=true" >> "$GITHUB_ENV"
          fi
      - name: Trigger dataset rebuild
        if: env.SYNC_COMMITED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build-dataset.yml --ref main
