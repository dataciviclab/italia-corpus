name: sync-upstream
on:
  schedule:
    - cron: '0 6 * * *'  # ogni giorno alle 07:00 italiane
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          git remote add upstream https://github.com/ahmeabd/italia-corpus.git
          git fetch upstream
          git merge upstream/main --no-edit
          git push origin main
      - name: Trigger dataset rebuild
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build-dataset.yml --ref main
