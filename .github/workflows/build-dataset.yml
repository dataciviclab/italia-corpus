name: build-dataset
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pandas pyarrow
      - run: python -m lab_tools.extract
      - run: |
          if [ -n "$(git status --porcelain data/derived/)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add data/derived/
            git commit -m "chore(data): update dataset [skip ci]"
            git push
          fi
