name: build-dataset
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      # Primo checkout: solo config/ per leggere la lista delle collezioni
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            config/
      - name: Build collections list
        id: cols
        run: |
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          cat config/collezioni.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      # Secondo checkout: tooling + collezioni vive
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            lab_tools/
            tests/
            data/derived/
            ${{ steps.cols.outputs.list }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v
      - run: python -m lab_tools.extract
      - run: |
          if [ -n "$(git status --porcelain data/derived/)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add data/derived/*.parquet
            git commit -m "chore(data): update dataset [skip ci]"
            git push
          fi
