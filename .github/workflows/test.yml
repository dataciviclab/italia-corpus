name: test-tooling
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
        timeout-minutes: 5
      - run: python -m pytest tests/ -v --ignore=data || echo "Nessun test trovato"
